name: Native runtime evidence

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  ios-simulator:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build and launch the iOS evidence fixture
        run: bash scripts/native_runtime_ci_ios.sh
      - name: Shut down Simulator
        if: always()
        run: xcrun simctl shutdown all || true
      - name: Upload iOS runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-runtime-ios-${{ github.run_id }}
          path: ${{ runner.temp }}/native-runtime-ios
          if-no-files-found: warn
          retention-days: 30

  android-emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - name: Build, launch, and interact with the Android evidence fixture
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: bash scripts/native_runtime_ci_android.sh
      - name: Upload Android runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-runtime-android-${{ github.run_id }}
          path: ${{ runner.temp }}/native-runtime-android
          if-no-files-found: warn
          retention-days: 30
