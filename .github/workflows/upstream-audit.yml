name: Upstream audit

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Build actionable upstream audit
        id: audit
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          python3 scripts/upstream_absorption_report.py
          --remote-details
          --fail-on-unreviewed
          --summary-file "$GITHUB_STEP_SUMMARY"
          > upstream-audit.txt 2>&1
      - name: Upload exact audit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: upstream-audit-${{ github.run_id }}
          path: upstream-audit.txt
          retention-days: 30
      - name: Open or update review issue
        if: steps.audit.outcome == 'failure'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const maintainIssue = require('./.github/scripts/upstream_review_issue.cjs');
            await maintainIssue({ github, context, mode: 'drift' });
      - name: Close resolved review issue
        if: steps.audit.outcome == 'success'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const maintainIssue = require('./.github/scripts/upstream_review_issue.cjs');
            await maintainIssue({ github, context, mode: 'resolved' });
      - name: Fail on unreviewed upstream drift
        if: steps.audit.outcome == 'failure'
        run: exit 1
