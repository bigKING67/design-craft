name: Upstream audit

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build actionable upstream audit
        id: audit
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          python3 scripts/upstream_absorption_report.py
          --remote-details
          --fail-on-unreviewed
          --summary-file "$GITHUB_STEP_SUMMARY"
          > upstream-audit.txt 2>&1
      - name: Upload exact audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upstream-audit-${{ github.run_id }}
          path: upstream-audit.txt
          retention-days: 30
      - name: Open or update review issue
        if: steps.audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const maintainIssue = require('./.github/scripts/upstream_review_issue.cjs');
            await maintainIssue({ github, context, mode: 'drift' });
      - name: Close resolved review issue
        if: steps.audit.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const maintainIssue = require('./.github/scripts/upstream_review_issue.cjs');
            await maintainIssue({ github, context, mode: 'resolved' });
      - name: Fail on unreviewed upstream drift
        if: steps.audit.outcome == 'failure'
        run: exit 1
