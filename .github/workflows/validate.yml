name: Validate

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  portable:
    name: ${{ matrix.os }} / Node ${{ matrix.node }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ["22", "24"]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
      - name: Validate portable package
        run: bash scripts/validate.sh --portable
      - name: Compile the iOS runtime fixture
        if: matrix.os == 'macos-latest' && matrix.node == '22' && matrix.python == '3.11'
        env:
          DESIGN_CRAFT_NATIVE_BUILD_ONLY: "1"
        run: bash scripts/native_runtime_ci_ios.sh
      - name: Enforce portable maturity
        run: python3 scripts/design_craft_maturity.py --profile portable --min-score 95

  android-fixture-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
      - name: Install Android fixture SDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          gradle-version: "8.9"
      - name: Compile the Android runtime fixture
        env:
          DESIGN_CRAFT_NATIVE_BUILD_ONLY: "1"
        run: bash scripts/native_runtime_ci_android.sh
